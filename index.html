<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Générateur de punchlines</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #0f141b;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --green: #2ea043;
        --green-hover: #3fb950;
        --green-soft: rgba(46, 160, 67, 0.14);
        --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #111827, var(--bg) 40%);
        color: var(--text);
      }

      .app {
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 20px;
        margin-bottom: 18px;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 120px;
        background: linear-gradient(90deg, rgba(46, 160, 67, 0.12), transparent 50%, rgba(63, 185, 80, 0.1));
        pointer-events: none;
      }

      .hero-top {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .logo {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        object-fit: cover;
        border: 1px solid var(--border);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(63, 185, 80, 0.25);
        background: var(--green-soft);
        color: #7ee787;
        font-size: 14px;
        font-weight: 600;
      }

      h1 {
        position: relative;
        margin: 0;
        font-size: 31px;
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .subtitle {
        position: relative;
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .form {
        padding: 16px;
        margin-bottom: 22px;
      }

      .field {
        margin-bottom: 14px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #c9d1d9;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--panel-2);
        color: var(--text);
        padding: 14px 15px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      input::placeholder {
        color: #6e7681;
      }

      input:focus,
      select:focus {
        border-color: var(--green-hover);
        box-shadow: 0 0 0 4px rgba(46, 160, 67, 0.12);
        background: #11161d;
      }

      .button {
        width: 100%;
        margin-top: 4px;
        border: 1px solid rgba(63, 185, 80, 0.28);
        border-radius: 18px;
        background: linear-gradient(180deg, var(--green-hover), var(--green));
        color: white;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, filter 0.2s ease;
        box-shadow: 0 12px 26px rgba(46, 160, 67, 0.22);
      }

      .button:hover {
        filter: brightness(1.05);
      }

      .button:active {
        transform: scale(0.99);
      }

      .results {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .result {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      }

      .result-text {
        margin: 0;
        font-size: 14px;
        line-height: 1.7;
        color: #e6edf3;
      }

      .index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 24px;
        height: 24px;
        margin-right: 8px;
        padding: 0 8px;
        border-radius: 999px;
        background: var(--green-soft);
        color: #7ee787;
        font-size: 12px;
        font-weight: 700;
        vertical-align: middle;
      }

      .copy-btn {
        flex-shrink: 0;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: #7ee787;
        border-radius: 14px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      .copy-btn:hover {
        background: var(--green-soft);
        border-color: rgba(63, 185, 80, 0.35);
      }

      .footer {
        margin-top: 20px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 480px) {
        .app {
          padding: 18px 12px 32px;
        }

        h1 {
          font-size: 28px;
        }

        .result {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="card hero">
        <div class="hero-top">
          <img src="alpha.png" alt="Logo loup" class="logo" />
          <div class="badge">Générateur de punchlines</div>
        </div>
        <h1>Trouve 10 punchlines en un clic</h1>
        <p class="subtitle">
          Version statique HTML/CSS/JS pour GitHub Pages. Plus de questions à remplir : tu cliques et ça te propose directement 10 punchlines.
        </p>
      </section>

      <section class="card form">
        <button id="refreshBtn" class="button">Générer 10 punchlines</button>
      </section>

      <section id="results" class="results"></section>

      <p class="footer">Style GitHub compatible GitHub Pages · HTML + CSS + JS</p>
    </div>

    <script>
      const punchlines = [
        'J’avance en silence, mais ça fait du bruit.',
        'Je build pendant que tu refresh.',
        'Moins de promesses, plus de preuves.',
        'Je suis passé en mode avion, mais je monte.',
        'Je fais du réel pendant que tu fais du contenu.',
        'Je préfère être solide que populaire.',
        'Je ne rush pas, je vise juste.',
        'Je suis focus, pas occupé.',
        'Je ne bluffe pas, je prouve.',
        'Je travaille même quand personne ne regarde.',
        'Je ne cherche plus, je crée.',
        'Je suis lent mais inarrêtable.',
        'Je suis devenu mon meilleur investissement.',
        'Je préfère construire que comparer.',
        'Je ne cours plus, je trace.',
        'Je suis là pour durer, pas pour buzzer.',
        'Je fais simple, mais ça frappe.',
        'Je coupe le superflu sans regret.',
        'Je préfère l’effort au discours.',
        'Je reste carré même quand c’est flou.',
        'Je vise la maîtrise, pas l’apparence.',
        'Je suis là pour avancer.',
        'Je préfère être respecté que validé.',
        'Je fais le travail que d’autres évitent.',
        'Je reste stable pendant que ça bouge.',
        'Je fais du silence une arme.',
        'Je préfère être sous-estimé.',
        'Je livre plus que je ne montre.',
        'Je suis cohérent même quand c’est dur.',
        'Je ne suis pas parfait, mais constant.',
        'Je fais des choix, pas des excuses.',
        'Je cherche à progresser.',
        'Je suis plus précis que rapide.',
        'Je préfère être efficace que visible.',
        'Je construis ma version.',
        'Je fais moins de bruit, plus de résultats.',
        'Je cherche le solide.',
        'Je termine ce que je commence.',
        'Je suis patient mais déterminé.',
        'Je pense grand et j’agis simple.',
        'Je fais du concret, pas des promesses.',
        'Je garde le cap.',
        'Je suis offline mais mes résultats parlent.',
        'Je suis régulier, pas spectaculaire.',
        'Je préfère durer que briller.',
        'Je produis pendant que tu procrastines.',
        'Je suis calme mais focus.',
        'Je fais le job, même sans motivation.',
        'Je suis constant, c’est ça la diff.',
        'Je fais plus que je ne montre.',
        'Je suis stable dans le chaos.',
        'Je suis devenu mon propre standard.',
        'Je les exécute.',
        'Je coupe ce qui ralentit.',
        'Je garde ce qui construit.',
        'Je suis dans le concret.',
        'Je sais ce que je veux.',
        'Je fais ce qu’il faut.',
        'Je reste focus.',
        'Je continue malgré tout.',
        'Je suis en train de monter.',
        'Je reste déterminé.',
        'Je suis dans l’action.',
        'Je continue d’avancer.',
        'Je garde la vision.',
        'Je construis quelque chose de réel.',
        'Je ne triche pas.',
        'Je fais les choses correctement.',
        'Je garde le cap, quoi qu’il arrive.'
      ];

      let refreshIndex = 0;

      function hashString(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          hash = (hash << 5) - hash + str.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function pickTen() {
        const seed = hashString(`${refreshIndex}`);

        return punchlines
          .map((line, index) => {
            const score = hashString(`${seed}-${line}-${index}`) % 1000;
            return { line, score };
          })
          .sort((a, b) => b.score - a.score)
          .slice(0, 10)
          .map((item) => item.line);
      }

      function render() {
        const results = document.getElementById('results');
        const lines = pickTen();
        results.innerHTML = lines
          .map(
            (line, index) => `
              <article class="result">
                <p class="result-text"><span class="index">${index + 1}</span>${line}</p>
                <button class="copy-btn" onclick="copyLine(${index})">Copier</button>
              </article>
            `
          )
          .join('');
        window.currentLines = lines;
      }

      function copyLine(index) {
        const text = window.currentLines[index];
        navigator.clipboard.writeText(text);
      }

      document.getElementById('refreshBtn').addEventListener('click', () => {
        refreshIndex += 1;
        render();
      });

      

      render();
    </script>
  </body>
</html>
